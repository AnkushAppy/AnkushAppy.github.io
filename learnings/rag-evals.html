<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Evaluation Frameworks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: #0a0d12;
      color: #e8ecf4;
      padding: 32px;
      min-height: 100%;
    }
    h1 { font-size: 1.25rem; margin-bottom: 8px; }
    .subtitle { color: #8b95a8; font-size: 0.875rem; margin-bottom: 28px; }
    .pipeline {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .step {
      background: #181e28;
      border: 1px solid #2a3344;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 0.8rem;
      font-weight: 500;
      text-align: center;
      min-width: 110px;
    }
    .step.highlight { border-color: #3b9eff; background: rgba(59,158,255,0.1); color: #3b9eff; }
    .arrow { color: #5c6678; font-size: 1.2rem; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .metric {
      background: #131820;
      border: 1px solid #1f2736;
      border-radius: 8px;
      padding: 16px;
    }
    .metric .label { font-size: 0.7rem; color: #5c6678; text-transform: uppercase; letter-spacing: 0.05em; }
    .metric .value { font-size: 1.5rem; font-weight: 700; color: #34d399; margin-top: 4px; }
    .metric .desc { font-size: 0.75rem; color: #8b95a8; margin-top: 4px; }
    canvas { display: block; margin-top: 24px; max-width: 100%; }
  </style>
</head>
<body>
  <h1>RAG Evaluation Pipeline</h1>
  <p class="subtitle">Production guardrails for clinical chatbot responses</p>

  <div class="pipeline">
    <div class="step">Query</div>
    <span class="arrow">→</span>
    <div class="step">Retrieval</div>
    <span class="arrow">→</span>
    <div class="step highlight">Relevance Score</div>
    <span class="arrow">→</span>
    <div class="step highlight">Faithfulness</div>
    <span class="arrow">→</span>
    <div class="step highlight">Safety Check</div>
    <span class="arrow">→</span>
    <div class="step">Response</div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="label">Retrieval@5</div>
      <div class="value">0.87</div>
      <div class="desc">Semantic match accuracy</div>
    </div>
    <div class="metric">
      <div class="label">Hallucination Rate</div>
      <div class="value">&lt;2%</div>
      <div class="desc">After guardrails</div>
    </div>
    <div class="metric">
      <div class="label">Eval Suite</div>
      <div class="value">1.2K</div>
      <div class="desc">Golden test cases</div>
    </div>
    <div class="metric">
      <div class="label">Latency</div>
      <div class="value">+45ms</div>
      <div class="desc">Eval overhead</div>
    </div>
  </div>

  <canvas id="chart" width="600" height="160"></canvas>

  <script>
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = 160 * dpr;
    ctx.scale(dpr, dpr);
    const w = canvas.offsetWidth;

    const data = [72, 78, 81, 85, 87, 89];
    const labels = ["W1", "W2", "W3", "W4", "W5", "W6"];
    const pad = { t: 20, r: 20, b: 30, l: 40 };
    const chartW = w - pad.l - pad.r;
    const chartH = 160 - pad.t - pad.b;

    ctx.strokeStyle = "#2a3344";
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = pad.t + (chartH / 4) * i;
      ctx.beginPath();
      ctx.moveTo(pad.l, y);
      ctx.lineTo(w - pad.r, y);
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.strokeStyle = "#3b9eff";
    ctx.lineWidth = 2;
    data.forEach((v, i) => {
      const x = pad.l + (chartW / (data.length - 1)) * i;
      const y = pad.t + chartH - (v / 100) * chartH;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    data.forEach((v, i) => {
      const x = pad.l + (chartW / (data.length - 1)) * i;
      const y = pad.t + chartH - (v / 100) * chartH;
      ctx.fillStyle = "#3b9eff";
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#5c6678";
      ctx.font = "11px DM Sans, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(labels[i], x, 160 - 8);
    });

    ctx.fillStyle = "#5c6678";
    ctx.font = "11px DM Sans, sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("Retrieval@5 over time (%)", pad.l, 14);
  </script>
</body>
</html>
